                desc: "අප්‍රේල් මස 20 වැනි සඳුදා පූර්ව භාග 06.27 ට ශ්වේත වර්ණ (සුදු) වස්ත්‍රාභරණයෙන් සැරසී කිරි බත් සහ එළකිරි මිශ්‍ර කැවිලි ද අනුභව කර දකුණු දිශාව බලා පිටත්ව යාම මැනවි.",
                highlightTime: "පෙ.ව. 06.27 ට",
                direction: "දකුණු දිශාව",
                colorText: "ශ්වේත වර්ණ (සුදු)",
                colorCode: "#ffffff",
                hasBorder: true,
                icon: "💼"
            }
        ];

        const container = document.getElementById('events-container');

        function renderEvents() {
            events.forEach((ev) => {
                let colorBadge = '';
                if (ev.colorText) {
                    let styleAttr = ev.colorCode.includes('gradient') 
                        ? `background: ${ev.colorCode};` 
                        : `background-color: ${ev.colorCode};`;
                    let borderClass = ev.hasBorder ? 'border border-gray-300' : 'border border-transparent';
                    colorBadge = `
                        <div class="flex items-center gap-2 mt-3 bg-white/60 backdrop-blur-sm px-3 py-1.5 rounded-full border border-gray-200 w-fit shadow-sm">
                            <span class="text-xs md:text-sm font-bold text-gray-700">වර්ණය:</span>
                            <div class="w-4 h-4 rounded-full shadow-inner ${borderClass}" style="${styleAttr}"></div>
                            <span class="text-xs md:text-sm font-semibold">${ev.colorText}</span>
                        </div>
                    `;
                }

                let directionBadge = '';
                if (ev.direction) {
                    directionBadge = `
                        <div class="flex items-center gap-2 mt-2 bg-amber-50/80 backdrop-blur-sm px-3 py-1.5 rounded-full border border-amber-200 w-fit shadow-sm">
                            <span class="text-xs md:text-sm font-bold text-amber-900">දිශාව:</span>
                            <span class="text-xs md:text-sm font-semibold text-amber-800">${ev.direction}</span>
                        </div>
                    `;
                }

                const cardHTML = `
                    <div class="nekath-card reveal p-5 md:p-8 mb-8 ${ev.isMain ? 'border-red-400 bg-red-50/30' : ''}">
                        <div class="flex flex-col lg:flex-row gap-6 md:gap-8 items-start lg:items-center">
                            
                            <!-- Content Side -->
                            <div class="flex-1 w-full">
                                <div class="flex items-start gap-4 mb-3">
                                    <div class="text-4xl md:text-5xl bg-amber-100/50 p-3 rounded-2xl shadow-sm border border-amber-50">
                                        ${ev.icon}
                                    </div>
                                    <div>
                                        <h2 class="text-xl md:text-2xl font-black ${ev.isMain ? 'text-red-700' : 'text-amber-900'} mb-2 leading-tight">
                                            ${ev.title}
                                        </h2>
                                        <div class="flex flex-wrap items-center gap-2 mb-2">
                                            <span class="bg-amber-100 text-amber-900 px-3 py-1 rounded-md text-sm font-bold border border-amber-200">
                                                ${ev.dateStr} ${ev.dayStr}
                                            </span>
                                            <span class="text-sm md:text-base font-bold text-gray-600 bg-gray-100 px-3 py-1 rounded-md border border-gray-200">
                                                වේලාව: <span class="text-red-600">${ev.highlightTime}</span>
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                <p class="text-gray-700 text-justify leading-relaxed md:text-lg pl-0 md:pl-[5.5rem]">
                                    ${ev.desc}
                                </p>
                                <div class="flex flex-wrap gap-2 md:gap-3 mt-3 pl-0 md:pl-[5.5rem]">
                                    ${directionBadge}
                                    ${colorBadge}
                                </div>
                            </div>

                            <!-- Countdown Side -->
                            <div class="w-full lg:w-72 bg-gradient-to-br from-stone-50 to-stone-100 rounded-2xl p-4 border border-stone-200 shadow-inner flex flex-col items-center justify-center shrink-0">
                                <p class="text-xs font-bold text-stone-500 mb-3 uppercase tracking-widest bg-white px-3 py-1 rounded-full shadow-sm border border-stone-100">ඉතිරි කාලය</p>
                                <div class="flex gap-2 text-center w-full justify-center" id="countdown-${ev.id}">
                                    <div class="flex-1 bg-white border border-stone-100 rounded-xl shadow-sm py-2 px-1">
                                        <div class="font-number text-xl md:text-2xl font-black text-amber-600" id="d-${ev.id}">00</div>
                                        <div class="text-[9px] md:text-[10px] text-gray-500 font-bold uppercase">දින</div>
                                    </div>
                                    <div class="flex-1 bg-white border border-stone-100 rounded-xl shadow-sm py-2 px-1">
                                        <div class="font-number text-xl md:text-2xl font-black text-amber-600" id="h-${ev.id}">00</div>
                                        <div class="text-[9px] md:text-[10px] text-gray-500 font-bold uppercase">පැය</div>
                                    </div>
                                    <div class="flex-1 bg-white border border-stone-100 rounded-xl shadow-sm py-2 px-1">
                                        <div class="font-number text-xl md:text-2xl font-black text-amber-600" id="m-${ev.id}">00</div>
                                        <div class="text-[9px] md:text-[10px] text-gray-500 font-bold uppercase">මිනිත්තු</div>
                                    </div>
                                    <div class="flex-1 bg-white border border-stone-100 rounded-xl shadow-sm py-2 px-1">
                                        <div class="font-number text-xl md:text-2xl font-black text-red-500" id="s-${ev.id}">00</div>
                                        <div class="text-[9px] md:text-[10px] text-gray-500 font-bold uppercase">තත්පර</div>
                                    </div>
                                </div>
                                <div id="msg-${ev.id}" class="hidden mt-3 text-green-700 font-bold text-sm bg-green-100/80 border border-green-200 px-4 py-2 rounded-lg w-full text-center">
                                    නැකැත් වේලාව පසු වී ඇත. ✓
                                </div>
                            </div>

                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // Timer calculation logic
        function calculateTimeLeft(targetDate) {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) return null;

            return {
                days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                seconds: Math.floor((distance % (1000 * 60)) / 1000)
            };
        }

        function updateAllCountdowns() {
            // Update Main Awurudu Countdown
            const mainTarget = new Date(awuruduUdawaTime).getTime();
            const mainTimeLeft = calculateTimeLeft(mainTarget);
            
            const mainContainer = document.getElementById('main-countdown-container');
            const mainMsg = document.getElementById('main-msg');

            if (!mainTimeLeft) {
                if(mainContainer) mainContainer.style.display = 'none';
                if(mainMsg) mainMsg.classList.remove('hidden');
            } else {
                document.getElementById('main-d').innerText = mainTimeLeft.days.toString().padStart(2, '0');
                document.getElementById('main-h').innerText = mainTimeLeft.hours.toString().padStart(2, '0');
                document.getElementById('main-m').innerText = mainTimeLeft.minutes.toString().padStart(2, '0');
                document.getElementById('main-s').innerText = mainTimeLeft.seconds.toString().padStart(2, '0');
            }

            // Update Individual Event Countdowns
            events.forEach(ev => {
                const eventTarget = new Date(ev.timestamp).getTime();
                const timeLeft = calculateTimeLeft(eventTarget);
                
                const countdownEl = document.getElementById(`countdown-${ev.id}`);
                const msgEl = document.getElementById(`msg-${ev.id}`);

                if (!timeLeft) {
                    if (countdownEl) countdownEl.style.display = 'none';
                    if (msgEl) msgEl.classList.remove('hidden');
                } else {
                    document.getElementById(`d-${ev.id}`).innerText = timeLeft.days.toString().padStart(2, '0');
                    document.getElementById(`h-${ev.id}`).innerText = timeLeft.hours.toString().padStart(2, '0');
                    document.getElementById(`m-${ev.id}`).innerText = timeLeft.minutes.toString().padStart(2, '0');
                    document.getElementById(`s-${ev.id}`).innerText = timeLeft.seconds.toString().padStart(2, '0');
                }
            });
        }

        // Initialize and setup scroll animations
        function init() {
            renderEvents();
            updateAllCountdowns();
            setInterval(updateAllCountdowns, 1000);

            // Intersection Observer for scroll animations
            const reveals = document.querySelectorAll('.reveal');
            const revealOptions = {
                threshold: 0.1,
                rootMargin: "0px 0px -50px 0px"
            };

            const revealOnScroll = new IntersectionObserver(function(entries, observer) {
                entries.forEach(entry => {
                    if (!entry.isIntersecting) return;
                    entry.target.classList.add('active');
                    observer.unobserve(entry.target);
                });
            }, revealOptions);

            reveals.forEach(reveal => {
                revealOnScroll.observe(reveal);
            });
        }

        // Run on load
        document.addEventListener('DOMContentLoaded', init);
    </script>
