                <div class="flex items-center gap-3 mb-4">
                    <div class="text-3xl">${event.icon}</div>
                    <h3 class="font-title text-2xl text-ausp-red font-bold leading-tight">${event.title}</h3>
                </div>
                
                <div class="mb-4">
                    <div class="text-gray-800 font-bold text-lg mb-1">${event.dateHighlight}</div>
                    <div class="inline-block bg-yellow-100 text-ausp-red border border-yellow-300 font-bold px-3 py-1 rounded-md text-md shadow-sm">
                        ${event.timeHighlight}
                    </div>
                </div>
                
                <p class="text-gray-700 leading-relaxed flex-grow text-sm md:text-base">${event.description}</p>
                
                <div class="mt-5 pt-4 border-t border-gray-100">
                    <div id="timer-${event.id}" class="text-center font-bold text-sm bg-gray-50 rounded-lg py-2 text-ausp-green border border-gray-200">
                        ගණනය කරමින්...
                    </div>
                </div>
            `;
            gridContainer.appendChild(card);
            cardElements[event.id] = document.getElementById(`timer-${event.id}`);
        });

        // The Main Event setup
        const mainEvent = events.find(e => e.isMain);
        const mainTimerContainer = document.getElementById('main-countdown');

        function createMainTimeBox(value, label) {
            return `
                <div class="timer-box w-20 h-24 md:w-28 md:h-32 flex flex-col items-center justify-center rounded-xl md:rounded-2xl border-b-4 border-ausp-gold">
                    <span class="text-3xl md:text-5xl font-black text-ausp-red">${value.toString().padStart(2, '0')}</span>
                    <span class="text-xs md:text-sm font-bold text-gray-500 mt-1 uppercase">${label}</span>
                </div>
            `;
        }

        // Update loop
        function updateAllTimers() {
            const now = new Date().getTime();

            // Update Main Event
            const mainDistance = mainEvent.targetTime - now;
            const mainVals = getCountdownValues(mainDistance);
            
            if (mainVals) {
                mainTimerContainer.innerHTML = 
                    createMainTimeBox(mainVals.days, 'දින') +
                    createMainTimeBox(mainVals.hours, 'පැය') +
                    createMainTimeBox(mainVals.minutes, 'මිනිත්තු') +
                    createMainTimeBox(mainVals.seconds, 'තත්පර');
            } else {
                mainTimerContainer.innerHTML = `<div class="text-2xl font-bold text-ausp-green p-4 bg-green-50 rounded-xl w-full border border-green-200">සුබ අලුත් අවුරුද්දක් වේවා! (මෙම නැකත පසු විය)</div>`;
            }

            // Update Grid Cards
            events.forEach(event => {
                if(event.isMain) return;
                
                const el = cardElements[event.id];
                const distance = event.targetTime - now;
                const vals = getCountdownValues(distance);

                if (vals) {
                    el.innerHTML = `තවත්: ${vals.days}d ${vals.hours}h ${vals.minutes}m ${vals.seconds}s`;
                    el.className = "text-center font-bold text-sm bg-gray-50 rounded-lg py-2 text-ausp-red border border-gray-200";
                } else {
                    el.innerHTML = `මෙම නැකත පසු විය`;
                    el.className = "text-center font-bold text-sm bg-green-50 rounded-lg py-2 text-ausp-green border border-green-200";
                }
            });
        }

        // Initialize and start interval
        updateAllTimers();
        setInterval(updateAllTimers, 1000);

    </script>
</body>
</html>
