                                <p class="text-sm font-bold text-stone-500 mb-2 uppercase tracking-wider">ඉතිරි කාලය</p>
                                <div class="flex gap-2 text-center w-full justify-center" id="countdown-${ev.id}">
                                    <div class="flex-1 bg-white border border-stone-200 rounded shadow-sm py-2">
                                        <div class="text-xl md:text-2xl font-black text-amber-600" id="d-${ev.id}">00</div>
                                        <div class="text-[10px] text-gray-500 font-bold">දින</div>
                                    </div>
                                    <div class="flex-1 bg-white border border-stone-200 rounded shadow-sm py-2">
                                        <div class="text-xl md:text-2xl font-black text-amber-600" id="h-${ev.id}">00</div>
                                        <div class="text-[10px] text-gray-500 font-bold">පැය</div>
                                    </div>
                                    <div class="flex-1 bg-white border border-stone-200 rounded shadow-sm py-2">
                                        <div class="text-xl md:text-2xl font-black text-amber-600" id="m-${ev.id}">00</div>
                                        <div class="text-[10px] text-gray-500 font-bold">මිනිත්තු</div>
                                    </div>
                                    <div class="flex-1 bg-white border border-stone-200 rounded shadow-sm py-2">
                                        <div class="text-xl md:text-2xl font-black text-red-500" id="s-${ev.id}">00</div>
                                        <div class="text-[10px] text-gray-500 font-bold">තත්පර</div>
                                    </div>
                                </div>
                                <div id="msg-${ev.id}" class="hidden mt-3 text-green-600 font-bold text-sm bg-green-100 px-3 py-1 rounded w-full text-center">
                                    නැකැත් වේලාව එළඹ ඇත
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        function updateCountdowns() {
            const now = new Date().getTime();
            events.forEach(ev => {
                const eventTime = new Date(ev.timestamp).getTime();
                const distance = eventTime - now;
                const countdownEl = document.getElementById(`countdown-${ev.id}`);
                const msgEl = document.getElementById(`msg-${ev.id}`);

                if (distance < 0) {
                    if (countdownEl) countdownEl.style.display = 'none';
                    if (msgEl) msgEl.classList.remove('hidden');
                } else {
                    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                    document.getElementById(`d-${ev.id}`).innerText = days.toString().padStart(2, '0');
                    document.getElementById(`h-${ev.id}`).innerText = hours.toString().padStart(2, '0');
                    document.getElementById(`m-${ev.id}`).innerText = minutes.toString().padStart(2, '0');
                    document.getElementById(`s-${ev.id}`).innerText = seconds.toString().padStart(2, '0');
                }
            });
        }

        renderEvents();
        updateCountdowns();
        setInterval(updateCountdowns, 1000);
    </script>
</body>
</html>
